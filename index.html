<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핵심보카 1200 · 단어장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EDE6D4;
    --paper-line:#DCD2B4;
    --card:#FFFCF5;
    --ink:#2A2E3A;
    --ink-soft:#736B58;
    --ink-faint:#A79E88;
    --gold:#B98A2C;
    --gold-deep:#8F6A1E;
    --green:#5F7A5D;
    --green-bg:#E4EBDF;
    --red:#A8433A;
    --red-bg:#F3E3DF;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(180deg, transparent, transparent 27px, var(--paper-line) 28px),
      var(--paper);
    font-family:'Noto Sans KR', sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding:28px 16px 60px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:520px;margin:0 auto;}

  /* ---- Header ---- */
  .eyebrow{
    font-size:11px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--ink-faint); font-weight:700; margin-bottom:6px;
    display:flex; align-items:center; gap:8px;
  }
  .eyebrow::before{content:''; width:16px; height:1px; background:var(--ink-faint);}
  h1{
    font-family:'Noto Serif KR', serif; font-weight:900;
    font-size:26px; margin:0 0 18px; letter-spacing:-.01em;
  }
  h1 span{color:var(--gold);}

  /* ---- Mode tabs ---- */
  .modes{
    display:flex; gap:6px; margin-bottom:14px;
    background:rgba(0,0,0,0.04); padding:4px; border-radius:12px;
  }
  .mode-btn{
    flex:1; border:none; background:transparent; padding:10px 6px;
    font-family:'Noto Sans KR'; font-weight:700; font-size:13.5px;
    color:var(--ink-soft); border-radius:9px; cursor:pointer;
    transition:background .15s, color .15s;
  }
  .mode-btn.active{background:var(--card); color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.12);}
  .mode-btn .cnt{display:block; font-size:10.5px; font-weight:500; color:var(--ink-faint); margin-top:1px;}
  .mode-btn.active .cnt{color:var(--gold-deep);}

  /* ---- Day picker ---- */
  .day-row{
    display:flex; gap:6px; overflow-x:auto; padding:2px 2px 12px;
    scrollbar-width:none;
  }
  .day-row::-webkit-scrollbar{display:none;}
  .day-chip{
    flex:0 0 auto; width:40px; height:40px; border-radius:10px;
    border:1px solid var(--paper-line); background:var(--card);
    font-family:'Noto Serif KR'; font-weight:700; font-size:13px;
    color:var(--ink-soft); cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .day-chip.active{background:var(--ink); color:var(--card); border-color:var(--ink);}

  /* ---- Progress ---- */
  .progress-row{
    display:flex; justify-content:space-between; align-items:center;
    font-size:12.5px; color:var(--ink-soft); margin-bottom:10px; padding:0 2px;
  }
  .progress-track{
    flex:1; height:4px; background:var(--paper-line); border-radius:2px;
    margin:0 12px; overflow:hidden;
  }
  .progress-fill{height:100%; background:var(--gold); border-radius:2px; transition:width .2s;}
  .sync-status{
    font-size:11px; text-align:right; margin:-6px 2px 10px; min-height:14px;
    color:var(--ink-faint);
  }
  .sync-status.error{color:var(--red); font-weight:700;}

  /* ---- Card ---- */
  .stage{position:relative; min-height:340px; margin-bottom:16px;}
  .card{
    position:relative; background:var(--card); border-radius:var(--radius);
    box-shadow:0 1px 2px rgba(0,0,0,.06), 0 10px 24px -12px rgba(42,46,58,.28);
    padding:34px 26px 26px; min-height:340px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; cursor:pointer; user-select:none;
    border:1px solid rgba(0,0,0,.04);
  }
  .card::before{
    content:''; position:absolute; top:0; left:22px; right:22px; height:3px;
    background:repeating-linear-gradient(90deg, var(--paper-line) 0 8px, transparent 8px 16px);
    border-radius:0 0 3px 3px;
  }
  .ribbon{
    position:absolute; top:0; right:22px; width:26px; height:44px;
    background:var(--ink-faint); clip-path:polygon(0 0,100% 0,100% 100%,50% 78%,0 100%);
    cursor:pointer; transition:background .15s, transform .1s;
    z-index:2;
  }
  .ribbon:active{transform:translateY(1px);}
  .ribbon.starred{background:var(--gold);}
  .ribbon svg{position:absolute; top:8px; left:5px; width:16px; height:16px;}

  .day-tag{
    position:absolute; top:14px; left:18px; font-size:10.5px; font-weight:700;
    color:var(--ink-faint); letter-spacing:.08em;
  }

  .word{
    font-family:'Noto Serif KR'; font-weight:900; font-size:34px;
    color:var(--ink); word-break:break-word; margin-bottom:6px;
  }
  .word-row{display:flex; align-items:center; justify-content:center; gap:10px;}
  .speak-btn{
    border:none; background:var(--paper); color:var(--gold-deep); cursor:pointer;
    width:34px; height:34px; border-radius:50%; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
    transition:background .15s, transform .1s;
  }
  .speak-btn:hover{background:#F3E7CE;}
  .speak-btn:active{transform:scale(.92);}
  .speak-btn svg{width:17px; height:17px;}
  .speak-btn.small{width:28px; height:28px;}
  .speak-btn.small svg{width:14px; height:14px;}
  .speak-btn.loading{opacity:.45; animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:.45;} 50%{opacity:.9;}}
  .hint{font-size:12px; color:var(--ink-faint); margin-bottom:18px;}
  .meaning-block{
    display:flex; flex-direction:column; gap:6px; align-items:center;
    animation:rise .18s ease;
  }
  @keyframes rise{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  .pos-line{display:flex; gap:8px; align-items:baseline; flex-wrap:wrap; justify-content:center;}
  .pos-badge{
    font-size:11px; font-weight:700; color:var(--gold-deep); background:#F3E7CE;
    padding:2px 7px; border-radius:5px; font-family:'Noto Sans KR';
  }
  .pos-def{font-size:17px; color:var(--ink); font-family:'Noto Serif KR'; font-weight:500;}
  .tap-cue{font-size:12px; color:var(--ink-faint); margin-top:22px;}

  .spell-meaning{
    font-size:19px; font-family:'Noto Serif KR'; font-weight:700; color:var(--ink);
    margin-bottom:22px; line-height:1.5;
  }
  .spell-meaning .pos-badge{margin-right:2px;}
  .spell-input-wrap{width:100%; display:flex; flex-direction:column; align-items:center; gap:10px;}
  .spell-input{
    width:100%; max-width:280px; text-align:center; font-family:'Noto Serif KR';
    font-size:20px; font-weight:700; padding:11px 10px; border-radius:9px;
    border:2px solid var(--paper-line); background:#fff; color:var(--ink);
    outline:none; transition:border-color .15s;
  }
  .spell-input:focus{border-color:var(--gold);}
  .spell-input.correct{border-color:var(--green); background:var(--green-bg); color:var(--green);}
  .spell-input.wrong{border-color:var(--red); background:var(--red-bg); color:var(--red);}
  .spell-feedback{font-size:13px; font-weight:700; min-height:18px;}
  .spell-feedback.correct{color:var(--green);}
  .spell-feedback.wrong{color:var(--red);}
  .spell-actions{display:flex; gap:8px; margin-top:2px;}

  /* ---- Buttons ---- */
  .btn{
    border:none; border-radius:9px; padding:10px 16px; font-family:'Noto Sans KR';
    font-weight:700; font-size:13.5px; cursor:pointer; transition:opacity .15s, transform .1s;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--ink); color:var(--card);}
  .btn-ghost{background:rgba(0,0,0,.05); color:var(--ink-soft);}
  .btn:disabled{opacity:.35; cursor:default;}

  .nav-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .nav-btn{
    width:46px; height:46px; border-radius:50%; border:1px solid var(--paper-line);
    background:var(--card); color:var(--ink); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex:0 0 auto;
    box-shadow:0 1px 2px rgba(0,0,0,.06);
  }
  .nav-btn:disabled{opacity:.3; cursor:default;}
  .nav-center{flex:1; text-align:center;}

  .empty-state{
    text-align:center; padding:50px 24px; color:var(--ink-soft);
  }
  .empty-state .ribbon-ico{margin:0 auto 14px; width:40px; height:40px; color:var(--gold);}
  .empty-state h3{font-family:'Noto Serif KR'; font-size:17px; margin:0 0 8px; color:var(--ink);}
  .empty-state p{font-size:13px; line-height:1.6; margin:0;}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }

  /* ---- Auth ---- */
  .account-row{
    display:flex; align-items:center; justify-content:space-between;
    margin:-8px 0 16px; font-size:12px; color:var(--ink-faint);
  }
  .account-row .email{font-weight:700; color:var(--ink-soft);}
  .link-btn{
    border:none; background:none; color:var(--ink-faint); font-size:12px;
    text-decoration:underline; cursor:pointer; font-family:'Noto Sans KR';
  }
  .auth-overlay{
    position:fixed; inset:0; background:var(--paper); z-index:50;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .auth-card{
    width:100%; max-width:340px; background:var(--card); border-radius:var(--radius);
    box-shadow:0 10px 24px -12px rgba(42,46,58,.28); padding:30px 26px;
  }
  .auth-card h2{
    font-family:'Noto Serif KR'; font-size:20px; margin:0 0 4px; color:var(--ink);
  }
  .auth-card .sub{font-size:12.5px; color:var(--ink-faint); margin:0 0 20px;}
  .auth-field{margin-bottom:12px;}
  .auth-field label{display:block; font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:5px;}
  .auth-field input{
    width:100%; padding:10px 12px; border-radius:8px; border:1.5px solid var(--paper-line);
    font-family:'Noto Sans KR'; font-size:14px; background:#fff; color:var(--ink); outline:none;
  }
  .auth-field input:focus{border-color:var(--gold);}
  .auth-error{font-size:12.5px; color:var(--red); margin:6px 0 0; min-height:16px;}
  .auth-actions{display:flex; flex-direction:column; gap:8px; margin-top:16px;}
  .auth-actions .btn{width:100%;}
  .auth-toggle{text-align:center; margin-top:14px; font-size:12.5px; color:var(--ink-faint);}
</style>
</head>
<body>
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <h2 id="authTitle">로그인</h2>
    <p class="sub" id="authSub">계정으로 로그인하면 여러 기기에서 즐겨찾기가 동기화돼요.</p>
    <div class="auth-field">
      <label>이메일</label>
      <input type="email" id="authEmail" autocomplete="email" placeholder="you@example.com">
    </div>
    <div class="auth-field">
      <label>비밀번호</label>
      <input type="password" id="authPassword" autocomplete="current-password" placeholder="6자 이상">
    </div>
    <div class="auth-error" id="authError">&nbsp;</div>
    <div class="auth-actions">
      <button class="btn btn-primary" id="authSubmitBtn">로그인</button>
    </div>
    <div class="auth-toggle">
      <span id="authToggleText">계정이 없으신가요?</span>
      <button class="link-btn" id="authToggleBtn">회원가입</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="eyebrow">해커스 아이엘츠 · IELTS VOCABULARY</div>
  <h1>핵심보카 <span>1200</span></h1>
  <div class="account-row">
    <span class="email" id="accountEmail"></span>
    <button class="link-btn" id="logoutBtn">로그아웃</button>
  </div>

  <div class="modes" id="modeTabs"></div>
  <div class="day-row" id="dayRow"></div>

  <div class="progress-row">
    <span id="progLabel">1 / 40</span>
    <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    <span id="starCount">★ 0</span>
  </div>
  <div class="sync-status" id="syncStatus">&nbsp;</div>

  <div class="stage" id="stage"></div>

  <div class="nav-row" id="navRow"></div>
</div>

function authHeaders(){

async function supabaseAuthRequest(path, body){
  const res = await fetch(SUPABASE_URL + '/auth/v1' + path, {
    method: 'POST',
    headers: { apikey: SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok){
    throw new Error(data.error_description || data.msg || data.error || '요청에 실패했어요');

  return data;
}

async function signUp(email, password){

  if(data.access_token){

    throw new Error('가입 확인 이메일을 보냈어요. 메일함을 확인한 뒤 로그인해주세요.');
  }
}

async function signIn(email, password){
  const data = await supabaseAuthRequest('/token?grant_type=password', { email, password });
  setSession(data);
}

async function trySilentLogin(){
  let refreshToken = null;
  try{ refreshToken = localStorage.getItem(REFRESH_KEY); }catch(e){ /* storage unavailable */ }
  if(!refreshToken) return false;
  try{
    const data = await supabaseAuthRequest('/token?grant_type=refresh_token', { refresh_token: refreshToken });
    setSession(data);
    return true;
  }catch(e){
    return false;
  }
}

function setSession(data){
  session = {
    access_token: data.access_token,
    refresh_token: data.refresh_token,
    user: data.user
  };
  try{ localStorage.setItem(REFRESH_KEY, data.refresh_token); }catch(e){ /* storage unavailable */ }
}

async function signOut(){

      method: 'POST',

    });
  }catch(e){ /* ignore network errors on logout */ }

}

  mode: 'memorize',   // memorize | spell | favorites

function daysAvailable(){
  const s = new Set(VOCAB.map(v => v[1]));
  return Array.from(s).sort((a,b)=>a-b);
}

function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

let dayDeckCache = {};
function buildDayDeck(day){
  dayDeckCache[day] = shuffleArray(VOCAB.filter(v => v[1] === day));
  return dayDeckCache[day];
}

let favDeckCache = null;
function buildFavDeck(){
  favDeckCache = shuffleArray(VOCAB.filter(v => starred.has(v[0])));
  return favDeckCache;
}

function currentDeck(){
  if(state.mode === 'favorites'){
    return favDeckCache || buildFavDeck();
  }
  return dayDeckCache[state.day] || buildDayDeck(state.day);
}

function buildRoundQueue(){
  const deck = currentDeck();
  state.queue = deck.slice();
  state.known = new Set();
  state.total = deck.length;
  state.flipped = false;
}

function parseMeaning(meaning){
  const posSet = ['adj','adv','prep','conj','pron','v','n'];
  const tokens = meaning.split(' ');
  const parts = [];
  let curPos = null, curDef = [];
  tokens.forEach(tok=>{
    if(posSet.includes(tok)){
      if(curPos){ parts.push({pos:curPos, def:curDef.join(' ').trim()}); }
      curPos = tok; curDef = [];
    } else {
      curDef.push(tok);
    }
  });
  if(curPos){ parts.push({pos:curPos, def:curDef.join(' ').trim()}); }
  if(parts.length===0) parts.push({pos:'', def:meaning});
  return parts;
}

function normalizeSpell(s){
  return s.toLowerCase().trim().replace(/[^a-z]/g,'');
}

const audioElCache = {}; // word -> preloaded HTMLAudioElement, ready to play instantly
let currentAudio = null;

function googleTtsUrl(word){
  return 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=en&q=' + encodeURIComponent(word);
}

let voices = [];
function loadVoices(){ voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; }
if(window.speechSynthesis){
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}
function speakTTS(word){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  const enVoice = voices.find(v => /en-US/i.test(v.lang)) || voices.find(v => v.lang && v.lang.startsWith('en'));
  if(enVoice) u.voice = enVoice;
  u.rate = 0.92;
  window.speechSynthesis.speak(u);
}

// Resolves the URL and creates a preloaded <audio> element, cached per word,
// so playback can start immediately on repeat plays / autoplay.
async function prepareAudio(word){
  if(audioElCache[word]) return audioElCache[word];
  const audio = new Audio();
  audio.preload = 'auto';
  audio.src = googleTtsUrl(word);
  audio.addEventListener('error', (e)=>{
    console.error('pronunciation audio failed to load for', word, e);
    audio.dataset.failed = '1';
  });
  audio.load();
  audioElCache[word] = audio;
  return audio;
}

function prefetchDeck(deck){
  // Warms the cache for every card in the deck in the background (no await).
  deck.forEach(entry => { prepareAudio(entry[2]); });
}

function setSpeakBtnState(btn, loading){
  if(!btn) return;
  btn.classList.toggle('loading', !!loading);
}

async function speak(word, btn){
  setSpeakBtnState(btn, true);
  if(currentAudio) currentAudio.pause();
  const audio = await prepareAudio(word);
  currentAudio = audio;
  setSpeakBtnState(btn, false);
  if(audio.dataset.failed === '1'){
    speakTTS(word);
    return;
  }
  try{ audio.currentTime = 0; }catch(e){}
  audio.play().catch((err)=>{
    console.error('pronunciation playback failed for', word, err);
    speakTTS(word);
  });
}

function autoPlayCurrent(){
  if(state.mode === 'spell') return; // spell mode: only manual playback via the hint button
  const entry = state.queue[0];
  if(entry) speak(entry[2], null);
}

      body: JSON.stringify({
        user_id: session.user.id,
        starred_ids: Array.from(starred),
        updated_at: new Date().toISOString()
      })
    });
    if(!res.ok){
      const body = await res.json().catch(()=>({}));
      console.error('save favorites error response', body);
      throw new Error(body.message || body.hint || body.details || `저장 실패 (${res.status})`);
    }
    setSyncStatus('저장됨');
    setTimeout(()=> setSyncStatus(''), 1500);
  }catch(e){
    console.error('save favorites failed', e);
    setSyncStatus('즐겨찾기 저장 실패 — voca_data 테이블/정책을 확인해주세요', true);
  }
}

function toggleStar(id){
  if(starred.has(id)) starred.delete(id); else starred.add(id);
  saveStarred();
  render();
}

function setMode(m){
  state.mode = m;
  state.flipped = false;
  state.spellStatus = null;
  if(m === 'favorites') buildFavDeck();
  buildRoundQueue();
  render();
  prefetchDeck(currentDeck());
  autoPlayCurrent();
}

function setDay(d){
  state.day = d;
  buildDayDeck(d);
  state.flipped = false;
  state.spellStatus = null;
  if(state.mode === 'memorize' || state.mode === 'spell') buildRoundQueue();
  render();
  prefetchDeck(currentDeck());
  autoPlayCurrent();
}

function proceedSpell(){
  const entry = state.queue.shift();
  if(entry){
    if(state.spellStatus === 'correct') state.known.add(entry[0]);
    else state.queue.push(entry); // wrong or revealed -> review again later
  }
  state.spellStatus = null;
  render();
  autoPlayCurrent();
}

function flip(){
  if(state.mode !== 'memorize' && state.mode !== 'favorites') return;
  state.flipped = !state.flipped;
  render();
}

function markKnown(){
  const entry = state.queue.shift();
  if(entry) state.known.add(entry[0]);
  state.flipped = false;
  render();
  autoPlayCurrent();
}

function markUnknown(){
  const entry = state.queue.shift();
  if(entry) state.queue.push(entry);
  state.flipped = false;
  render();
  autoPlayCurrent();
}

function restartRound(){
  buildRoundQueue();
  render();
  prefetchDeck(currentDeck());
  autoPlayCurrent();
}

function checkSpell(inputEl){
  const entry = state.queue[0];
  if(!entry) return;
  const answer = entry[2];
  const ok = normalizeSpell(inputEl.value) === normalizeSpell(answer);
  state.spellStatus = ok ? 'correct' : 'wrong';
  renderStage();
}

function revealSpell(){
  state.spellStatus = 'revealed';
  renderStage();
}

function renderModeTabs(){
  const el = document.getElementById('modeTabs');
  const dayCount = VOCAB.filter(v=>v[1]===state.day).length;
  const favCount = starred.size;
  const modes = [
    {id:'memorize', label:'암기 학습', cnt: dayCount+'개'},
    {id:'spell', label:'스펠 학습', cnt: dayCount+'개'},
    {id:'favorites', label:'즐겨찾기', cnt: favCount+'개'},
  ];
  el.innerHTML = modes.map(m => `
    <button class="mode-btn ${state.mode===m.id?'active':''}" data-mode="${m.id}">
      ${m.label}<span class="cnt">${m.cnt}</span>
    </button>`).join('');
  el.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> setMode(btn.dataset.mode));
  });
}

function renderDayRow(){
  const el = document.getElementById('dayRow');
  if(state.mode === 'favorites'){ el.style.display='none'; return; }
  el.style.display='flex';
  const days = daysAvailable();
  el.innerHTML = days.map(d=>`
    <button class="day-chip ${d===state.day?'active':''}" data-day="${d}">${d}</button>
  `).join('');
  el.querySelectorAll('.day-chip').forEach(btn=>{
    btn.addEventListener('click', ()=> setDay(parseInt(btn.dataset.day)));
  });
  const activeChip = el.querySelector('.day-chip.active');
  if(activeChip) activeChip.scrollIntoView({inline:'center', block:'nearest'});
}

function renderProgress(){
  const total = state.total;
  const known = state.known.size;
  document.getElementById('progLabel').textContent = total ? `외운 단어 ${known} / ${total}` : '0 / 0';
  document.getElementById('progFill').style.width = total ? `${(known/total)*100}%` : '0%';
  document.getElementById('starCount').textContent = `★ ${starred.size}`;
}

function ribbonSvg(isStar){
  return `<svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2l2.6 6.6L21 9.2l-5 4.6L17.4 21 12 17.3 6.6 21 8 13.8l-5-4.6 6.4-.6z"/></svg>`;
}

function ribbonSvgFilled(){
  return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.6 6.6L21 9.2l-5 4.6L17.4 21 12 17.3 6.6 21 8 13.8l-5-4.6 6.4-.6z"/></svg>`;
}

function renderStage(){
  const stage = document.getElementById('stage');
  document.getElementById('navRow').innerHTML = ''; // no mode uses prev/next anymore

  if(state.total === 0){
    const msg = state.mode === 'favorites'
      ? {h:'즐겨찾기한 카드가 없어요', p:'암기 학습이나 스펠 학습 중에 헷갈리는 단어의<br>리본을 눌러 중요 카드로 표시해보세요.'}
      : {h:'단어가 없어요', p:'다른 Day를 선택해보세요.'};
    stage.innerHTML = `
      <div class="empty-state">
        <div class="ribbon-ico">${ribbonSvgFilled()}</div>
        <h3>${msg.h}</h3>
        <p>${msg.p}</p>
      </div>`;
    renderProgress();
    return;
  }

  if(state.queue.length === 0){
    const label = state.mode === 'favorites' ? '즐겨찾기' : `Day ${state.day}`;
    const verb = state.mode === 'spell' ? '스펠' : '암기';
    stage.innerHTML = `
      <div class="card" style="cursor:default;">
        <div style="font-size:38px; margin-bottom:8px;">🎉</div>
        <h3 style="font-family:'Noto Serif KR'; font-size:19px; margin:0 0 8px;">${label} ${verb} 완료!</h3>
        <p style="font-size:13px; color:var(--ink-soft); margin:0 0 22px;">${state.total}개 단어를 모두 맞혔어요.</p>
        <button class="btn btn-primary" id="restartBtn">다시 학습하기</button>
      </div>`;
    document.getElementById('restartBtn').addEventListener('click', restartRound);
    renderProgress();
    return;
  }

  const entry = state.queue[0];
  const [id, day, word, meaning] = entry;
  const isStar = starred.has(id);
  const parts = parseMeaning(meaning);
  const posHtml = parts.map(p => `<span class="pos-line">${p.pos?`<span class="pos-badge">${p.pos}</span>`:''}<span class="pos-def">${p.def}</span></span>`).join('');

  if(state.mode === 'spell'){
    const status = state.spellStatus;
    const answered = status === 'correct' || status === 'wrong' || status === 'revealed';
    stage.innerHTML = `
      <div class="card" style="cursor:default;">
        <div class="day-tag">DAY ${day}</div>
        <div class="ribbon ${isStar?'starred':''}" id="ribbonBtn">${ribbonSvg(isStar)}</div>
        <div class="spell-meaning">${posHtml}</div>
        <button class="speak-btn small" id="speakBtnHint" title="발음 듣기" style="margin:-14px 0 18px;">${speakerIcon}</button>
        <div class="spell-input-wrap">
          <input class="spell-input ${status==='correct'?'correct':(status==='wrong'||status==='revealed')?'wrong':''}"
                 id="spellInput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
                 placeholder="영단어 스펠링 입력"
                 ${answered ? `value="${word}" readonly` : ''}>
          <div class="spell-feedback ${status==='correct'?'correct':(status==='wrong'||status==='revealed')?'wrong':''}">
            ${status==='correct' ? '정답이에요!' : status==='wrong' ? `오답이에요! 정답: ${word}` : status==='revealed' ? `정답: ${word}` : '\u00A0'}
          </div>
          <div class="spell-actions">
            ${answered
              ? `<button class="btn btn-primary" id="nextBtn">다음</button>`
              : `<button class="btn btn-primary" id="checkBtn">확인</button>
                 <button class="btn btn-ghost" id="revealBtn">정답 보기</button>`
            }
          </div>
        </div>
      </div>`;
    document.getElementById('ribbonBtn').addEventListener('click', (e)=>{
      e.stopPropagation(); toggleStar(id);
    });
    document.getElementById('speakBtnHint').addEventListener('click', (e)=> speak(word, e.currentTarget));
    const input = document.getElementById('spellInput');
    if(!answered){
      input.focus();
      input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') checkSpell(input); });
      document.getElementById('checkBtn').addEventListener('click', ()=> checkSpell(input));
      document.getElementById('revealBtn').addEventListener('click', revealSpell);
    } else {
      const nextBtn = document.getElementById('nextBtn');
      nextBtn.focus();
      nextBtn.addEventListener('click', proceedSpell);
      document.addEventListener('keydown', function onEnter(e){
        if(e.key==='Enter'){ document.removeEventListener('keydown', onEnter); proceedSpell(); }
      }, {once:true});
    }
  } else {
    // memorize / favorites — flip card with know / don't-know buttons
    stage.innerHTML = `
      <div class="card" id="flipCard">
        <div class="day-tag">DAY ${day}</div>
        <div class="ribbon ${isStar?'starred':''}" id="ribbonBtn">${ribbonSvg(isStar)}</div>
        ${!state.flipped ? `
          <div class="word-row"><div class="word">${word}</div><button class="speak-btn" id="speakBtn">${speakerIcon}</button></div>
          <div class="tap-cue">탭하면 뜻이 보여요</div>
        ` : `
          <div class="word-row"><div class="word" style="font-size:24px;">${word}</div><button class="speak-btn small" id="speakBtn">${speakerIcon}</button></div>
          <div class="meaning-block" style="margin:14px 0 22px;">${posHtml}</div>
          <div class="spell-actions">
            <button class="btn btn-ghost" id="unknownBtn">헷갈려요</button>
            <button class="btn btn-primary" id="knownBtn">외웠어요</button>
          </div>
        `}
      </div>`;
    document.getElementById('flipCard').addEventListener('click', (e)=>{
      if(e.target.closest('#ribbonBtn') || e.target.closest('#speakBtn') || e.target.closest('#knownBtn') || e.target.closest('#unknownBtn')) return;
      flip();
    });
    document.getElementById('ribbonBtn').addEventListener('click', (e)=>{
      e.stopPropagation(); toggleStar(id);
    });
    document.getElementById('speakBtn').addEventListener('click', (e)=>{
      e.stopPropagation(); speak(word, e.currentTarget);
    });
    const knownBtn = document.getElementById('knownBtn');
    const unknownBtn = document.getElementById('unknownBtn');
    if(knownBtn) knownBtn.addEventListener('click', (e)=>{ e.stopPropagation(); markKnown(); });
    if(unknownBtn) unknownBtn.addEventListener('click', (e)=>{ e.stopPropagation(); markUnknown(); });
  }

  renderProgress();
}

function render(){
  renderModeTabs();
  renderDayRow();
  renderStage();
}

function showAuthOverlay(){
  document.getElementById('authOverlay').style.display = 'flex';
}
function hideAuthOverlay(){
  document.getElementById('authOverlay').style.display = 'none';
}

function updateAccountRow(){
  document.getElementById('accountEmail').textContent = session && session.user ? session.user.email : '';
}

function setAuthMode(mode){
  authMode = mode;
  const title = document.getElementById('authTitle');
  const sub = document.getElementById('authSub');
  const submitBtn = document.getElementById('authSubmitBtn');
  const toggleText = document.getElementById('authToggleText');
  const toggleBtn = document.getElementById('authToggleBtn');
  document.getElementById('authError').textContent = '\u00A0';
  if(mode === 'login'){
    title.textContent = '로그인';
    sub.textContent = '계정으로 로그인하면 여러 기기에서 즐겨찾기가 동기화돼요.';
    submitBtn.textContent = '로그인';
    toggleText.textContent = '계정이 없으신가요?';
    toggleBtn.textContent = '회원가입';
  } else {
    title.textContent = '회원가입';
    sub.textContent = '이메일과 비밀번호로 새 계정을 만들어요.';
    submitBtn.textContent = '회원가입';
    toggleText.textContent = '이미 계정이 있으신가요?';
    toggleBtn.textContent = '로그인';
  }
}

async function handleAuthSubmit(){
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  const btn = document.getElementById('authSubmitBtn');
  errEl.textContent = '\u00A0';
  if(!email || !password){
    errEl.textContent = '이메일과 비밀번호를 입력해주세요.';
    return;
  }
  btn.disabled = true;
  try{
    if(authMode === 'login'){
      await signIn(email, password);
    } else {
      await signUp(email, password);
    }
    hideAuthOverlay();
    updateAccountRow();
    startApp();
  }catch(e){
    errEl.textContent = e.message || '문제가 발생했어요. 다시 시도해주세요.';
  }finally{
    btn.disabled = false;
  }
}

document.getElementById('authSubmitBtn').addEventListener('click', handleAuthSubmit);
document.getElementById('authPassword').addEventListener('keydown', (e)=>{ if(e.key==='Enter') handleAuthSubmit(); });
document.getElementById('authToggleBtn').addEventListener('click', ()=> setAuthMode(authMode === 'login' ? 'signup' : 'login'));
document.getElementById('logoutBtn').addEventListener('click', signOut);

function startApp(){
  buildDayDeck(1);
  buildRoundQueue();
  render();
  prefetchDeck(currentDeck());
  autoPlayCurrent();
  loadStarred();
}

(async function init(){
  const ok = await trySilentLogin();
  if(ok){
    hideAuthOverlay();
    updateAccountRow();
    startApp();
  } else {
    showAuthOverlay();
  }
})();
</script>
</body>
</html>
